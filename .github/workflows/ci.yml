name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: superwizor-staging
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev/superwizor-staging/services

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: bufbuild/buf-setup-action@v1
      - run: make proto
        working-directory: superwizor-backend
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: superwizor-backend/services/hello-world

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: bufbuild/buf-setup-action@v1
      - run: make proto
        working-directory: superwizor-backend
      - run: make test
        working-directory: superwizor-backend

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # required for WIF
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: bufbuild/buf-setup-action@v1
      - run: make proto
        working-directory: superwizor-backend
      - name: Build and push hello-world image
        working-directory: superwizor-backend
        run: |
          docker build -t ${REGISTRY}/hello-world:${GITHUB_SHA::8} \
            -f services/hello-world/Dockerfile .
          docker push ${REGISTRY}/hello-world:${GITHUB_SHA::8}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hello-world \
            --image=${REGISTRY}/hello-world:${GITHUB_SHA::8} \
            --region=${REGION} \
            --platform=managed \
            --allow-unauthenticated \
            --max-instances=2 \
            --project=${PROJECT_ID}

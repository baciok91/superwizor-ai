syntax = "proto3";

package identity.v1;

option go_package = "github.com/superwizor-ai/backend/proto/gen/go/identity/v1";

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  string id = 1;
  string email = 2;
}

service IdentityService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

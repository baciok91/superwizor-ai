name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: superwizor-staging
  REGION: europe-central2
  REPOSITORY: services
  IMAGE_NAME: superwizor-api

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'

      - name: Install dependencies
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.60.3

      - name: Lint Protobuf
        run: buf lint proto/

      - name: Generate Protobuf
        run: buf generate proto/

      - name: Lint Go
        run: make lint

      - name: Run Tests
        run: make test

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    # Required for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/37136378230/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-sa@superwizor-staging.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Migrator image
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/superwizor-migrator"
          docker build -t $IMAGE_PATH:${{ github.sha }} -t $IMAGE_PATH:latest -f services/migrator/Dockerfile .
          docker push -a $IMAGE_PATH

      - name: Build and Push API image
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          docker build -t $IMAGE_PATH:${{ github.sha }} -t $IMAGE_PATH:latest -f services/api/Dockerfile .
          docker push -a $IMAGE_PATH

      - name: Deploy and Run Migration Job
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/superwizor-migrator:${{ github.sha }}"
          gcloud run jobs deploy db-migrator \
            --image $IMAGE_PATH \
            --region ${{ env.REGION }} \
            --vpc-connector swvpc-connector \
            --set-secrets="DB_PASSWORD=superwizor-db-password:latest" \
            --set-env-vars="DB_USER=superwizor_app,DB_HOST=10.17.0.3,DB_NAME=superwizor" \
            --command="migrate" \
            --args="-path,/migrations,-database,postgres://\$(DB_USER):\$(DB_PASSWORD)@\$(DB_HOST):5432/\$(DB_NAME)?sslmode=disable,up"

          gcloud run jobs execute db-migrator --region ${{ env.REGION }} --wait

      - name: Deploy API to Cloud Run
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          gcloud run deploy api-service \
            --image $IMAGE_PATH:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --vpc-connector swvpc-connector \
            --set-env-vars="ENV=staging"

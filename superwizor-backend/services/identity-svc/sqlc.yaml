version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapters/postgres/queries"
    schema: "../../migrations"
    gen:
      go:
        package: "db"
        out: "internal/adapters/postgres/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        overrides:
          - db_type: uuid
            go_type: github.com/google/uuid.UUID
          - db_type: timestamptz
            go_type: time.Time
